<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SALA — Visão de Projetos</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1923;--bg-card:#112240;--border:#1e3a5f;--txt:#c8d8ee;--txt2:#6b8caa;--green:#7fddbb;--gd:#1a9b6a;--badge-bg:#085041;--badge-txt:#9FE1CB;--red:#e53e3e;--yellow:#d69e2e;--sw:228px}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;height:56px;background:linear-gradient(90deg,#0a1628,#112240);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100}
.hdr-back{color:var(--txt2);text-decoration:none;font-size:12px;padding:4px 9px;border:1px solid var(--border);border-radius:4px;transition:.15s}
.hdr-back:hover{color:var(--txt);border-color:var(--gd)}
.hdr-badge{background:var(--badge-bg);color:var(--badge-txt);font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:.5px}
.hdr-title{font-size:15px;font-weight:600}
.hdr-actions{margin-left:auto;display:flex;gap:7px}
/* BUTTONS */
.btn{padding:6px 12px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--txt2);font-size:12px;font-family:inherit;cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{color:var(--txt);border-color:var(--gd)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-primary{background:var(--gd);border-color:var(--gd);color:#fff}
.btn-primary:hover{background:#158a5d}
.btn-danger{background:#7b1d1d;border-color:#c53030;color:#fc8181}
.btn-danger:hover{background:#9b2c2c}
.btn-icon{padding:5px 8px;font-size:13px}
/* LAYOUT */
.layout{display:flex;position:fixed;top:56px;bottom:0;left:0;right:0}
/* SIDEBAR */
.sb{width:var(--sw);background:#0a1628;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.sb-group{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;padding:14px 12px 5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--txt2);border-left:3px solid transparent;transition:.12s;user-select:none}
.sb-item:hover{background:rgba(127,221,187,.06);color:var(--txt)}
.sb-item.active{background:rgba(26,155,106,.12);border-left-color:var(--gd);color:var(--green)}
.sb-item.dim{opacity:.42}
.sb-sub{padding-left:28px}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--gd)}.dot-y{background:var(--yellow)}.dot-r{background:var(--red)}.dot-e{background:#1e3a5f;border:1px dashed var(--txt2)}.dot-b{background:#5a7fd4}
.sb-chevron{margin-left:auto;font-size:10px;transition:.2s}
.sb-chevron.open{transform:rotate(90deg)}
.sb-hr{border:none;border-top:1px solid var(--border);margin:6px 0}
.sb-foot{margin-top:auto;padding:10px 12px 14px;display:flex;flex-direction:column;gap:6px}
/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 24px}
/* ASIDE */
.aside{width:262px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;padding:18px 14px}
/* KPI */
.kpi-row{display:flex;gap:10px;margin-bottom:18px}
.kpi{flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px 14px 12px}
.kpi-val{font-size:28px;font-weight:700;line-height:1}
.kpi-lbl{font-size:11px;color:var(--txt2);margin-top:3px}
/* FUNNEL */
.funnel{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:18px}
.funnel-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:12px}
.funnel-track{display:flex;align-items:flex-end;gap:0}
.funnel-step{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.funnel-n{font-size:22px;font-weight:700}
.funnel-lbl{font-size:10px;color:var(--txt2)}
.funnel-bar{width:100%;border-radius:2px 2px 0 0}
.funnel-arr{color:var(--txt2);font-size:14px;padding:0 2px;margin-bottom:18px;align-self:center}
/* SQUAD GRID */
.sq-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.sq-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative;cursor:pointer;transition:.15s}
.sq-card:hover{border-color:#2a5a8f}
.sq-bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.bar-g{background:var(--gd)}.bar-y{background:var(--yellow)}.bar-r{background:var(--red)}.bar-gr{background:#1e3a5f}
.sq-body{padding:14px 14px 12px 18px}
.sq-card.dim{opacity:.48}
.sq-name{font-size:14px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.tag-obf{background:#1a3a5c;color:#7fb3dd}
.tag-sub{background:#1a3a2c;color:var(--green)}
.tag-nd{background:#1e3a5f;color:var(--txt2)}
.sq-ctrs{display:flex;gap:14px;margin-bottom:9px}
.ctr{text-align:center}.ctr-v{font-size:18px;font-weight:700}.ctr-l{font-size:9px;color:var(--txt2);margin-top:1px}
.prog-wrap{height:4px;background:#1e3a5f;border-radius:2px;margin-bottom:9px}
.prog-fill{height:100%;border-radius:2px;background:var(--gd)}
.sq-flags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.flag{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.flag-imp{background:#3d1515;color:#fc8181}.flag-dep{background:#2a1745;color:#b794f4}.flag-blk{background:#3d2510;color:#fbd38d}
.sq-meta{font-size:11px;color:var(--txt2);display:flex;justify-content:space-between;align-items:center;gap:4px}
/* ALERT BANNER */
.alert-banner{background:linear-gradient(90deg,#6b1515,#8b2020);border:1px solid #c53030;border-radius:6px;padding:10px 14px;margin-bottom:18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
/* ASIDE */
.aside-sec{margin-bottom:18px}
.aside-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:9px}
.alert-it{background:#180c0c;border:1px solid #4a1d1d;border-radius:6px;padding:9px 10px;margin-bottom:7px;font-size:12px}
.alert-it-sq{font-weight:700;color:#fc8181;margin-bottom:2px}
.alert-it-desc{color:var(--txt2);line-height:1.4}
.dec-it{display:flex;gap:7px;margin-bottom:9px;font-size:12px}
.dec-num{width:20px;height:20px;border-radius:50%;background:#1e3a5f;color:var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.ow-it{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:12px}
.urg{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700}
.urg-c{background:#3d1515;color:#fc8181}.urg-a{background:#2d1c00;color:#fbd38d}.urg-p{background:#0d2d1a;color:var(--green)}
/* TABLE */
.tbl-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.tbl-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-size:14px;font-weight:600}
.tbl-footer{padding:10px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--txt2);display:flex;gap:14px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);border-bottom:1px solid var(--border);background:rgba(0,0,0,.2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid rgba(30,58,95,.4);color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(127,221,187,.03)}
/* STATUS / RISK */
.sp{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;white-space:nowrap}
.sp-bl{background:#1a2a3a;color:var(--txt2)}.sp-dv{background:#0d2744;color:#7fb3dd}.sp-hm{background:#1a2d1a;color:var(--green)}.sp-bk{background:#3d1515;color:#fc8181}.sp-pr{background:#0d3b2d;color:#4fd1a0}
.rk-a{color:#fc8181;font-weight:600}.rk-m{color:#fbd38d;font-weight:600}.rk-b{color:var(--green);font-weight:600}
/* PAGE HEADER */
.pg-hd{margin-bottom:18px}
.pg-title{font-size:20px;font-weight:700;margin-bottom:3px}
.pg-sub{font-size:13px;color:var(--txt2)}
/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:14px;font-weight:600}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 16px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--txt2);font-size:12px;font-family:inherit;cursor:pointer;transition:.15s}
.tab.active{background:var(--gd);border-color:var(--gd);color:#fff}
/* GANTT */
.gantt-row{display:flex;align-items:center;margin-bottom:6px}
.gantt-lbl{width:185px;flex-shrink:0;font-size:11px;color:var(--txt2);padding-right:10px;line-height:1.3}
.gantt-track{flex:1;height:26px;background:#0d1e35;border-radius:4px;position:relative;overflow:hidden}
.gantt-bar{position:absolute;top:4px;height:18px;border-radius:3px}
.gantt-bar-lbl{position:absolute;top:0;bottom:0;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:#e53e3e;z-index:2}
/* GUARDIAN CARDS */
.grd-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.grd-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.grd-id{font-size:11px;color:var(--txt2);font-family:monospace}
.dep-tag{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600}
.dep-chg{background:#2a1745;color:#b794f4}.dep-ti{background:#0d2744;color:#7fb3dd}.dep-api{background:#1a3a2c;color:var(--green)}.dep-ok{background:#0d3b2d;color:#4fd1a0}
/* RISK */
.risk-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.risk-lv{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;text-align:center}
.risk-lv-a{background:#3d1515;color:#fc8181}.risk-lv-m{background:#2d1c00;color:#fbd38d}.risk-lv-b{background:#0d3b2d;color:#4fd1a0}
/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--txt2)}
.empty-ico{font-size:44px;margin-bottom:14px}
.empty h3{font-size:17px;color:var(--txt);margin-bottom:6px}
/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#0d1e35;border:1px solid var(--border);border-radius:10px;padding:22px;width:520px;max-width:92vw;max-height:82vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:13px}
.flbl{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.fi,.fsel,.fta{width:100%;background:#0a1628;border:1px solid var(--border);border-radius:4px;color:var(--txt);padding:8px 10px;font-family:inherit;font-size:13px;transition:.15s}
.fi:focus,.fsel:focus,.fta:focus{outline:none;border-color:var(--gd)}
.fsel option{background:#0a1628}
.fta{min-height:72px;resize:vertical}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* SPRINT VISION */
.sprint-squad{margin-bottom:20px}
.sprint-squad-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px 8px 0 0;cursor:pointer;user-select:none}
.sprint-squad-hdr:hover{background:#162a4a}
.sprint-squad-body{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden}
.story-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid rgba(30,58,95,.4);font-size:12px;transition:.12s}
.story-row:last-child{border-bottom:none}
.story-row:hover{background:rgba(127,221,187,.04)}
.story-jira{font-family:monospace;font-size:11px;color:var(--green);text-decoration:none;font-weight:600;white-space:nowrap}
.story-jira:hover{text-decoration:underline}
.refined-badge{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;white-space:nowrap}
.ref-yes{background:#0d3b2d;color:#4fd1a0}
.ref-no{background:#1e3a5f;color:var(--txt2)}
.sprint-section-lbl{padding:7px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:rgba(0,0,0,.2);color:var(--txt2);border-bottom:1px solid rgba(30,58,95,.4)}
.pts{font-size:10px;background:#1e3a5f;color:var(--txt2);padding:1px 5px;border-radius:3px;font-weight:600}
/* ROADMAP */
.rm-model-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.rm-tab{padding:7px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--txt2);font-size:12px;font-family:inherit;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.rm-tab:hover{border-color:var(--gd);color:var(--txt)}
.rm-tab.active{background:rgba(26,155,106,.15);border-color:var(--gd);color:var(--green);font-weight:600}
/* Now/Next/Later */
.nnl-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
.nnl-col{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.nnl-col-hdr{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700}
.nnl-col-body{padding:12px}
.nnl-card{border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:12px;background:rgba(0,0,0,.15)}
.nnl-card:last-child{margin-bottom:0}
.nnl-card-title{font-weight:600;margin-bottom:4px;font-size:13px}
.nnl-card-meta{color:var(--txt2);font-size:11px;display:flex;gap:8px;flex-wrap:wrap}
.nnl-card-tag{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;background:#1e3a5f;color:var(--txt2)}
/* Timeline */
.tl-date-header{display:flex;margin-bottom:8px}
.tl-lbl-spacer{width:185px;flex-shrink:0}
.tl-dates{flex:1;display:flex;position:relative;height:18px}
.tl-date-mk{position:absolute;font-size:10px;color:var(--txt2);transform:translateX(-50%);white-space:nowrap}
/* MISC */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;background:var(--border);color:var(--txt2)}
.fw7{font-weight:700}.fs12{font-size:12px}.c2{color:var(--txt2)}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a4a7a}
</style>
</head>
<body>
<header class="hdr">
  <a href="https://salaleadtime.github.io/leadtime-dash" class="hdr-back">← Lead Time</a>
  <span class="hdr-badge">SALA</span>
  <span class="hdr-title">Visão de Projetos</span>
  <div class="hdr-actions">
    <button class="btn" onclick="openSettings()">⚙ Configurações</button>
    <button class="btn" onclick="triggerImport()">⬆ Importar XLSX</button>
    <button class="btn" onclick="exportCSV()">⬇ Exportar CSV</button>
    <button class="btn btn-primary" onclick="copyBriefing()">📋 Briefing</button>
  </div>
  <input type="file" id="jiraInput" accept=".xlsx,.xls" style="display:none" onchange="handleJiraFile(event)">
</header>
<div class="layout">
  <nav class="sb" id="sidebar"></nav>
  <main class="main" id="main"></main>
  <aside class="aside" id="aside" style="display:none"></aside>
</div>
<div class="modal-ov" id="modalOv" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

// ── HELPERS ───────────────────────────────────────────────────────────────────
function spClass(s){return{Backlog:'sp-bl','Em Dev':'sp-dv',HML:'sp-hm',Bloqueado:'sp-bk','Produção':'sp-pr'}[s]||'sp-bl'}
function rkClass(r){return{Alto:'rk-a',Médio:'rk-m',Baixo:'rk-b'}[r]||''}
function sp(s){return`<span class="sp ${spClass(s)}">${s}</span>`}
function rk(r){return`<span class="${rkClass(r)}">${r}</span>`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function jiraLink(id){const base=D.settings&&D.settings.jiraBaseUrl?D.settings.jiraBaseUrl:'';return base?`<a class="story-jira" href="${esc(base)}${esc(id)}" target="_blank" rel="noopener">${esc(id)}</a>`:`<span class="story-jira" style="cursor:default">${esc(id)}</span>`}

function allStories(){
  const r=[];
  const e=D.squads.expresso1;
  Object.keys(e.frentes).forEach(fk=>e.frentes[fk].stories.forEach(s=>r.push({...s,squad:'Expresso-1',frente:e.frentes[fk].name,squadKey:'expresso1',frenteKey:fk})));
  D.squads.guardioes.stories.forEach(s=>r.push({...s,squad:'Guardiões',frente:'—',squadKey:'guardioes',frenteKey:null}));
  return r;
}
function funnelCounts(){const c={Backlog:0,'Em Dev':0,HML:0,Bloqueado:0,'Produção':0};allStories().forEach(s=>{if(c[s.status]!==undefined)c[s.status]++;});return c;}
function squadCounts(stories){
  const c={Backlog:0,'Em Dev':0,HML:0,Bloqueado:0,'Produção':0};
  stories.forEach(s=>{if(c[s.status]!==undefined)c[s.status]++;});
  const total=stories.length,done=c['Produção'];
  return{...c,total,pct:total?Math.round((done/total)*100):0};
}
function getStoriesRef(sk,fk){if(sk==='guardioes')return D.squads.guardioes.stories;return D.squads.expresso1.frentes[fk].stories;}

// ── SPRINT VISION ─────────────────────────────────────────────────────────────
function renderSprintVision(){
  let h=`<div class="pg-hd"><div class="pg-title">Visão da Sprint</div><div class="pg-sub">Histórias refinadas e não refinadas por squad — clique no ID para abrir no Jira</div></div>`;
  // Build squads list
  const sections=[];
  const e1=D.squads.expresso1;
  Object.keys(e1.frentes).forEach(fk=>{
    const fr=e1.frentes[fk];
    sections.push({label:`Expresso-1 / ${fr.name}`,color:'#d69e2e',stories:fr.stories,key:`e1_${fk}`,impediment:fr.impediment,note:fr.note});
  });
  sections.push({label:'Guardiões',color:'#e53e3e',stories:D.squads.guardioes.stories,key:'grd',impediment:'3 histórias bloqueadas com dependências'});

  sections.forEach(sec=>{
    const refined=sec.stories.filter(s=>s.refined);
    const notRefined=sec.stories.filter(s=>!s.refined);
    const isOpen=sprintCollapsed[sec.key]!==true;
    const c=squadCounts(sec.stories);
    h+=`<div class="sprint-squad">
      <div class="sprint-squad-hdr" onclick="toggleSprintSection('${sec.key}')">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="width:4px;height:28px;background:${sec.color};border-radius:2px;flex-shrink:0;display:inline-block"></span>
          <div>
            <div style="font-weight:700;font-size:14px">${esc(sec.label)}</div>
            <div style="font-size:11px;color:var(--txt2);margin-top:2px">
              <span style="color:var(--green)">${refined.length} refinadas</span> · <span>${notRefined.length} não refinadas</span> · ${c.pct}% entregue
              ${sec.impediment?` · <span style="color:#fc8181">⚠ ${esc(sec.impediment)}</span>`:''}
              ${sec.note?` · <span style="color:var(--green)">ℹ ${esc(sec.note)}</span>`:''}
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="display:flex;gap:6px">
            ${['Backlog','Em Dev','HML','Bloqueado','Produção'].map(st=>c[st]>0?`<span class="sp ${spClass(st)}" style="font-size:9px">${st} ${c[st]}</span>`:'').join('')}
          </div>
          <span style="color:var(--txt2);font-size:12px">${isOpen?'▲':'▼'}</span>
        </div>
      </div>`;
    if(isOpen){
      h+=`<div class="sprint-squad-body">`;
      if(refined.length){
        h+=`<div class="sprint-section-lbl">✅ Refinadas — prontas para sprint (${refined.length})</div>`;
        refined.forEach((s,i)=>h+=storyRow(s,sec.key==='grd'?'guardioes':'expresso1',sec.key==='grd'?null:sec.key.replace('e1_',''),i,sec.stories.indexOf(s)));
      }
      if(notRefined.length){
        h+=`<div class="sprint-section-lbl" style="color:#fbd38d">📝 Não refinadas — aguardam refinamento (${notRefined.length})</div>`;
        notRefined.forEach((s,i)=>h+=storyRow(s,sec.key==='grd'?'guardioes':'expresso1',sec.key==='grd'?null:sec.key.replace('e1_',''),i,sec.stories.indexOf(s)));
      }
      if(!sec.stories.length)h+=`<div style="padding:20px;text-align:center;color:var(--txt2);font-size:12px">Nenhuma história cadastrada</div>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  document.getElementById('main').innerHTML=h;
}

function storyRow(s,squadKey,frenteKey,_i,realIdx){
  const depStr=s.dependency&&s.dependencyStatus!=='Resolvido'?`<span class="dep-tag dep-chg" style="font-size:9px">🔗 ${esc(s.dependency)}</span>`:'';
  const pts=s.points?`<span class="pts">${s.points}pts</span>`:'<span class="pts" style="opacity:.4">—</span>';
  const sprintStr=s.sprint?`<span style="font-size:10px;color:var(--txt2)">${esc(s.sprint)}</span>`:'<span style="font-size:10px;color:var(--txt2);opacity:.5">Sem sprint</span>';
  return`<div class="story-row">
    <div style="flex-shrink:0">${jiraLink(s.id)}</div>
    <div style="flex:1;min-width:0"><div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.summary)}</div></div>
    <div style="flex-shrink:0;display:flex;align-items:center;gap:6px;flex-wrap:nowrap">
      ${depStr}
      ${sp(s.status)}
      ${rk(s.risk)}
      ${pts}
      <span style="font-size:11px;color:var(--txt2)">${esc(s.assignee)}</span>
      ${sprintStr}
      <span style="font-size:11px;color:var(--txt2)">${esc(s.deadline)}</span>
      <span class="refined-badge ${s.refined?'ref-yes':'ref-no'}">${s.refined?'✓ Refinada':'Pendente'}</span>
      <button class="btn btn-sm" onclick="openEditStory('${squadKey}','${frenteKey||''}',${realIdx})">✎</button>
    </div>
  </div>`;
}

function renderGanttRoadmap(){
  const START=new Date('2026-06-01'),END=new Date('2026-10-31'),TODAY=new Date('2026-06-07');
  const total=END-START,todayPct=((TODAY-START)/total)*100;
  function pctDate(ds){
    if(!ds)return 50;
    const [d,m]=ds.split('/');
    return Math.min(100,Math.max(0,((new Date(`2026-${m.padStart(2,'0')}-${d.padStart(2,'0')}`)-START)/total)*100));
  }
  function bar(startP,endP,color,label,dim=false){
    const w=Math.max(2,endP-startP);
    return`<div class="gantt-bar" style="left:${startP}%;width:${w}%;background:${color};opacity:${dim?.55:1}"><div class="gantt-bar-lbl">${esc(label)}</div></div>`;
  }
  const rows=[
    {lbl:'Expresso-1 / OBF',color:'#d69e2e',   start:2,  end:pctDate('20/06'),label:'Sprint 42–43'},
    {lbl:'Expresso-1 / Subsídios',color:'#1a9b6a',start:4,end:pctDate('30/06'),label:'Sprint 42–43'},
    {lbl:'Guardiões',color:'#e53e3e',            start:0,  end:pctDate('20/06'),label:'Sprint 42 ⚠'},
    {lbl:'Consolidação OBF',color:'#5a7fd4',     start:34, end:70,              label:'Jul–Ago'},
    {lbl:'Automação Subsídios',color:'#3a8f6a',  start:42, end:78,              label:'Ago–Set',dim:true},
    {lbl:'Contact — Onboarding',color:'#888',    start:55, end:88,              label:'Set–Out',dim:true},
    {lbl:'Inter — Migração Arq.',color:'#5a4fd4',start:65, end:98,              label:'Out+',dim:true},
  ];
  const marks=[
    {label:'Jun',pct:0},{label:'Jul',pct:((new Date('2026-07-01')-START)/total)*100},
    {label:'Ago',pct:((new Date('2026-08-01')-START)/total)*100},{label:'Set',pct:((new Date('2026-09-01')-START)/total)*100},
    {label:'Out',pct:((new Date('2026-10-01')-START)/total)*100},{label:'Nov',pct:100}
  ];
  let h=`<div class="tbl-wrap" style="padding:18px 18px 14px">`;
  // Date header
  h+=`<div class="tl-date-header"><div class="tl-lbl-spacer"></div><div style="flex:1;position:relative;height:20px">`;
  marks.forEach(m=>h+=`<span class="tl-date-mk" style="left:${m.pct}%">${m.label}</span>`);
  h+=`</div></div>`;
  // Rows
  rows.forEach(r=>{
    h+=`<div class="gantt-row"><div class="gantt-lbl">${esc(r.lbl)}</div><div class="gantt-track">`;
    h+=bar(r.start,r.end,r.color,r.label,r.dim||false);
    h+=`<div class="gantt-today" style="left:${todayPct}%" title="Hoje (07/06)"></div>`;
    h+=`</div></div>`;
  });
  h+=`<div style="margin-top:12px;font-size:11px;color:var(--txt2);display:flex;gap:16px;align-items:center;flex-wrap:wrap">
    <span><span style="display:inline-block;width:10px;height:10px;background:#e53e3e;border-radius:2px;margin-right:4px"></span>Linha vermelha = hoje</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:#d69e2e;border-radius:2px;margin-right:4px"></span>Sprint atual</span>
    <span style="opacity:.55">Barras mais opacas = horizontes futuros (sujeitos a revisão)</span>
  </div>`;
  h+=`</div>`;
  return h;
}

function openEditStory(sk,fk,idx){const s=getStoriesRef(sk,fk)[idx];if(!s)return;showModal(`<div class="modal-title">Editar história — ${esc(s.id)}</div>${storyForm(s,sk==='guardioes')}<div class="modal-acts"><button class="btn" onclick="delStory('${sk}','${fk}',${idx})">🗑 Excluir</button><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveStory('${sk}','${fk}',${idx},false)">Salvar</button></div>`);}
function openAddStory(sk,fk){showModal(`<div class="modal-title">Nova história</div>${storyForm(null,sk==='guardioes')}<div class="modal-acts"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveStory('${sk}','${fk||'obf'}',-1,true)">Adicionar</button></div>`);}
function storyForm(s,isG){
  const v=s||{id:'',summary:'',assignee:'',status:'Backlog',deadline:'',risk:'Médio',refined:false,sprint:'',points:'',dependency:'',dependencyStatus:'Aguardando',daysStopped:0,notes:''};
  return`<div class="fg"><label class="flbl">ID Jira</label><input class="fi" id="f-id" value="${esc(v.id)}"></div>
  <div class="fg"><label class="flbl">Resumo</label><input class="fi" id="f-summary" value="${esc(v.summary)}"></div>
  <div class="fg"><label class="flbl">Responsável</label><input class="fi" id="f-assignee" value="${esc(v.assignee)}"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="fg"><label class="flbl">Status</label><select class="fsel" id="f-status">${['Backlog','Em Dev','HML','Bloqueado','Produção'].map(x=>`<option ${v.status===x?'selected':''}>${x}</option>`).join('')}</select></div>
    <div class="fg"><label class="flbl">Risco</label><select class="fsel" id="f-risk">${['Alto','Médio','Baixo'].map(x=>`<option ${v.risk===x?'selected':''}>${x}</option>`).join('')}</select></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
    <div class="fg"><label class="flbl">Prazo (DD/MM)</label><input class="fi" id="f-deadline" value="${esc(v.deadline)}"></div>
    <div class="fg"><label class="flbl">Sprint</label><input class="fi" id="f-sprint" value="${esc(v.sprint||'')}"></div>
    <div class="fg"><label class="flbl">Story Points</label><input class="fi" type="number" id="f-points" value="${v.points||''}"></div>
  </div>
  <div class="fg"><label class="flbl">Refinada?</label><select class="fsel" id="f-refined"><option value="1" ${v.refined?'selected':''}>Sim</option><option value="0" ${!v.refined?'selected':''}>Não</option></select></div>
  ${isG?`<div class="fg"><label class="flbl">Área dependente</label><input class="fi" id="f-dep" value="${esc(v.dependency||'')}"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="fg"><label class="flbl">Status dependência</label><select class="fsel" id="f-depst">${['Aguardando','Bloqueado','Resolvido'].map(x=>`<option ${(v.dependencyStatus||'')===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="fg"><label class="flbl">Dias parado</label><input class="fi" type="number" id="f-days" value="${v.daysStopped||0}"></div></div>`:''}
  <div class="fg"><label class="flbl">Notas</label><textarea class="fta" id="f-notes">${esc(v.notes||'')}</textarea></div>`;
}
function saveStory(sk,fk,idx,isNew){
  const stories=getStoriesRef(sk,fk);
  const isG=sk==='guardioes';
  const obj={id:document.getElementById('f-id').value.trim(),summary:document.getElementById('f-summary').value.trim(),assignee:document.getElementById('f-assignee').value.trim(),status:document.getElementById('f-status').value,risk:document.getElementById('f-risk').value,deadline:document.getElementById('f-deadline').value.trim(),sprint:document.getElementById('f-sprint').value.trim(),points:parseInt(document.getElementById('f-points').value)||null,refined:document.getElementById('f-refined').value==='1',notes:document.getElementById('f-notes').value.trim()};
  if(isG){obj.dependency=document.getElementById('f-dep').value.trim();obj.dependencyStatus=document.getElementById('f-depst').value;obj.daysStopped=parseInt(document.getElementById('f-days').value)||0;}
  if(isNew)stories.push(obj);else stories[idx]={...stories[idx],...obj};
  saveData();closeModal();renderMain();
}
function delStory(sk,fk,idx){if(!confirm('Excluir?'))return;getStoriesRef(sk,fk).splice(idx,1);saveData();closeModal();renderMain();}

function showModal(h){document.getElementById('modalBox').innerHTML=h;document.getElementById('modalOv').style.display='flex';}

// ── IMPORT JIRA XLSX ───────────────────────────────────────────────────────────
function triggerImport(){document.getElementById('jiraInput').click();}
function handleJiraFile(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      let n=0;
      rows.forEach(row=>{
        const id=String(row['Issue key']||row['Key']||row['ID']||'').trim();
        const summary=String(row['Summary']||row['Resumo']||'').trim();
        if(!id&&!summary)return;
        const smap={'To Do':'Backlog','In Progress':'Em Dev','In Review':'HML','Done':'Produção','Blocked':'Bloqueado'};
        const rmap={'Highest':'Alto','High':'Alto','Medium':'Médio','Low':'Baixo','Lowest':'Baixo'};
        D.squads.expresso1.frentes.obf.stories.push({
          id,summary,assignee:String(row['Assignee']||'').trim(),
          status:smap[String(row['Status']||'')]||'Backlog',
          risk:rmap[String(row['Priority']||'')]||'Médio',
          deadline:String(row['Due Date']||'').trim(),
          sprint:String(row['Sprint']||'').trim(),points:null,refined:false,notes:'(importado)'
        });n++;
      });
      saveData();alert(`${n} histórias importadas para Expresso-1 / OBF.`);navigate('expresso1','obf');
    }catch(err){alert('Erro: '+err.message);}
    ev.target.value='';
  };
  reader.readAsBinaryString(file);
}

// ── EXPORT CSV ─────────────────────────────────────────────────────────────────
function exportCSV(){
  const rows=allStories();
  const BOM='﻿';
  const cols=['Squad','Frente','ID Jira','Resumo','Responsável','Status','Prazo','Risco','Refinada','Sprint','Pontos'];
  const csv=[cols.map(c=>`"${c}"`).join(';'),...rows.map(r=>[r.squad,r.frente,r.id,r.summary,r.assignee,r.status,r.deadline,r.risk,r.refined?'Sim':'Não',r.sprint||'',r.points||''].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(';'))];
  const blob=new Blob([BOM+csv.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`sala-projetos-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

// ── COPY BRIEFING ──────────────────────────────────────────────────────────────
function copyBriefing(){
  const e1=D.squads.expresso1,gd=D.squads.guardioes;
  const obf=e1.frentes.obf.stories,sub=e1.frentes.subsidios.stories;
  const lines=[
    `📊 BRIEFING SALA | Visão de Projetos | ${new Date().toLocaleDateString('pt-BR')}`,``,
    `▶ EXPRESSO-1 — Status: AMARELO`,
    `  OBF (${obf.length} histórias | ${obf.filter(s=>s.refined).length} refinadas):`,
    ...obf.filter(s=>s.status!=='Produção').map(s=>`    – ${s.id} | ${s.summary} | ${s.assignee} | ${s.status} | ${s.deadline} | Risco ${s.risk}`),``,
    `  Subsídios (${sub.length} histórias | ${sub.filter(s=>s.refined).length} refinadas):`,
    ...sub.filter(s=>s.status!=='Produção').map(s=>`    – ${s.id} | ${s.summary} | ${s.assignee} | ${s.status} | ${s.deadline}`),``,
    `▶ GUARDIÕES — Status: VERMELHO`,
    ...gd.stories.filter(s=>s.status==='Bloqueado').map(s=>`  🔒 ${s.id} | ${s.summary} | ${s.daysStopped}d parado | Dep: ${s.dependency||'—'}`),``,
    `▶ ESCALAÇÕES (${D.escalations.length}):`,
    ...D.escalations.map((e,i)=>`  ${i+1}. [${e.urgency}] ${e.squad}: ${e.description}\n     → ${e.decision}`),``,
    `▶ PRÓXIMAS AÇÕES:`,
    ...D.nextSteps.slice(0,4).map(s=>`  ${s.priority}. ${s.squad} | ${s.action} | ${s.responsible} | ${s.deadline}`),``,
    `Gerado automaticamente — painel SALA Visão de Projetos`
  ];
  const text=lines.join('\n');
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>alert('Briefing copiado! Cole no Teams.'));
  else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Briefing copiado!');}
}
