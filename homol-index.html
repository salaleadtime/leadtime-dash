<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivos para Homologação - Leadtime Dash</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 { text-align: center; margin-bottom: 40px; color: #333; }
        .files-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .file-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 30px; text-align: center; transition: transform 0.2s, box-shadow 0.2s; }
        .file-card:hover { transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .file-card h2 { margin-bottom: 10px; color: #2563eb; font-size: 18px; }
        .file-card p { color: #666; margin-bottom: 20px; font-size: 14px; }
        .file-card a { display: inline-block; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px; font-weight: 500; transition: background 0.2s; }
        .file-card a:hover { background: #1d4ed8; }
        .file-info { color: #999; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Arquivos para Homologação</h1>
        <div class="files-grid">
            <div class="file-card">
                <h2>📑 Index Page</h2>
                <p>Página principal do Leadtime Dashboard</p>
                <a href="index-homol.html" target="_blank">Abrir Index</a>
                <div class="file-info">364 KB</div>
            </div>
            <div class="file-card">
                <h2>🎯 Discovery PMO</h2>
                <p>Página de Discovery do PMO</p>
                <a href="discovery-pmo-homol.html" target="_blank">Abrir Discovery PMO</a>
                <div class="file-info">487 KB</div>
            </div>
        </div>
    </div>
</body>
</html>
