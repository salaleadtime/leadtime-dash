name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch dashboard for deployment
        run: python3 .github/scripts/patch_dashboard.py
      - name: Apply visual layout patch
        run: python3 .github/scripts/layout_dashboard_grafite_patch.py
      - name: Compact buttons for UX
        run: python3 .github/scripts/ux_compact_buttons_patch.py
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
